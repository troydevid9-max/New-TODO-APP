<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MODERN TODO APP</title>
    <link rel="stylesheet" href="./styles/style.css">

</head>

<body data-layout="public">

    <div id="header"></div>

    <section class="hero">
        <div id="right">
            <div class="greet">
                <h1
                    style="color: #333; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-weight: 600; font-size: 3rem;">
                    Good Afternoon, User</h1>
            </div>

            <div class="recent">
                <h3
                    style="color: #333; font-weight: 500; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; ">
                    Recently Created ToDo's </h3>

                <div class="recntlyCreated">
               <div class="info"><h2 style="font-size: 1.3rem; font-weight: 600; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #333;">Add a task to show here 📒</h2></div>
                </div>
            </div>



        </div>

        

        <div id="left">
            <div class="addTaskHolder">
                <h2 style="color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-weight: 700; font-size: 2rem">Add New Task</h2>

               <div class="inputs">
                 <input type="text" class="taskInput" placeholder="Add a task?">

                <textarea name="description" class="taskDetails" placeholder="Write a description...."></textarea>

                <button class="submit">Done</button>
               </div>
            </div>


        </div>
    </section>


    <script src="./script/script.js"></script>
    <script src="./script/include.js"></script>
</body>

</html>
